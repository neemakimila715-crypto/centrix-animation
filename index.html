<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mwaliko wa Harusi - Centrix Digital</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #fff5f8;
            color: #4a4a4a;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            border-radius: 15px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        h1 { color: #d63384; font-size: 28px; }
        
        .couple-names {
            font-size: 35px;
            font-weight: bold;
            margin: 20px 0;
            color: #d63384;
        }

        .image-box img {
            width: 100%;
            border-radius: 10px;
            margin: 15px 0;
        }

        .details {
            font-size: 18px;
            line-height: 1.6;
            margin: 20px 0;
        }

        .btn-map {
            display: inline-block;
            padding: 12px 20px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            margin-top: 15px;
        }

        /* Styling ya Fomu */
        .contact-form {
            background-color: #fdf2f7;
            padding: 25px;
            border-radius: 10px;
            margin-top: 40px;
            text-align: left;
            border: 1px solid #f2d1e1;
        }

        .contact-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #d63384;
        }

        .contact-form input, .contact-form textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background-color: #d63384;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover { background-color: #b02a6b; }

        .btn-email-direct {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: #d44638;
            text-decoration: none;
            font-weight: bold;
        }

        footer {
            padding: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="image-box">
            <img src="maharusi.jpg" alt="Picha ya Maharusi">
        </div>

        <h1>Mwaliko wa Harusi</h1>
        <p>Tunafurahi kukualika katika sherehe yetu ya upendo</p>

        <div class="couple-names">Juma & Mariam</div>

        <div class="details">
            <p><strong>TAREHE:</strong> 25 Desemba, 2026</p>
            <p><strong>MUDA:</strong> Saa 8:00 Mchana</p>
            <p><strong>UKUMBI:</strong> Royal Village, Dodoma</p>
        </div>

        <a href="https://maps.google.com" target="_blank" class="btn-map">📍 Fungua Ramani</a>

        <hr style="margin: 40px 0; border: 0; border-top: 1px solid #eee;">

        <div class="contact-form">
            <h3 style="text-align: center; margin-bottom: 20px;">Weka Oda ya Kadi Yako</h3>
            
            <form action="https://formspree.io/f/MWEKEA_ID_YAKO_HAPA" method="POST">
                <label>Jina Lako:</label>
                <input type="text" name="name" placeholder="Andika jina lako" required>

                <label>Namba ya Simu:</label>
                <input type="tel" name="phone" placeholder="07XXXXXXXX" required>

                <label>Unahitaji kadi ya aina gani?</label>
                <textarea name="message" rows="4" placeholder="Mfano: Nahitaji kadi ya harusi yenye rangi nyekundu na dhahabu..." required></textarea>

                <button type="submit" class="btn-submit">Tuma Ombi Sasa</button>
            </form>
            
            <a href="mailto:email_yako@gmail.com" class="btn-email-direct">📧 Au tuma email moja kwa moja</a>
        </div>
    </div>

    <footer><p>Imetengenezwa na Centrix Digital Services</p></footer>

    <audio id="weddingMusic" loop><source src="wimbo.mp3" type="audio/mpeg"></audio>

    <script>
        document.body.addEventListener('click', function() {
            var audio = document.getElementById('weddingMusic');
            if (audio.paused) { audio.play(); }
        });
    </script>

</body>
</html>
